<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}} | Formulary Blog</title>
  <meta name="description" content="{{metaDescription}}" />
  <meta name="robots" content="index, follow" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/output.css" />
  <link rel="icon" href="/images/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/images/favicon.png" />
  <meta property="og:image" content="https://www.formulary.app/images/favicon.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@yourhandle" />
  <meta name="twitter:image" content="https://www.formulary.app/images/favicon.png" />
  <link rel="alternate" hreflang="en" href="https://www.formulary.app/blog-post" />
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{title}}",
    "description": "{{metaDescription}}",
    "author": {
      "@type": "Organization",
      "name": "Formulary"
    },
    "datePublished": "{{date}}",
    "image": "https://www.formulary.app/images/favicon.png",
    "publisher": {
      "@id": "https://www.formulary.app/#organization"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "{{title}}",
    "description": "{{metaDescription}}",
    "publisher": {
      "@id": "https://www.formulary.app/#organization"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://www.formulary.app/"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "Blog",
        "item": "https://www.formulary.app/pages/blog.html"
      },
      {
        "@type": "ListItem",
        "position": 3,
        "name": "{{title}}"
      }
    ]
  }
  </script>
</head>
<body class="font-body text-ink antialiased">
  <div id="site-header"></div>
  <main id="main">
    <section class="border-b border-line bg-surface py-16">
      <div class="mx-auto max-w-3xl px-6 lg:px-10">
        <nav aria-label="Breadcrumb" class="label-tag text-xs text-ink-soft/70">
          <a href="/index.html" class="hover:text-brand-deep">Home</a> <span aria-hidden="true">/</span> <a href="/pages/blog.html" class="hover:text-brand-deep">Blog</a>
        </nav>
        <span class="label-tag mt-6 inline-block rounded-full bg-brand-mist px-2.5 py-1 text-[11px] font-medium text-brand-deep uppercase">{{category}}</span>
        <h1 class="mt-4 font-display text-4xl font-bold tracking-tight text-ink sm:text-5xl">{{title}}</h1>
        <div class="mt-6 flex items-center gap-4 text-sm text-ink-soft">
          <span>{{date}}</span>
          <span aria-hidden="true">·</span>
          <span>{{readTime}}</span>
        </div>
      </div>
    </section>
    <section class="py-16">
      <div class="mx-auto max-w-3xl px-6 lg:px-10 markdown-content">
        {{content}}
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../../js/app.js" defer></script>
</body>
</html>
