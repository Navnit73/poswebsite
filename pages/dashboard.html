<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Formulary Dashboard | Formulary</title>
  <meta name="description" content="Log in to your Formulary dashboard to manage pharmacy inventory, process sales, and view reports." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://www.formulary.app/pages/dashboard.html" />
  
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Formulary" />
  <meta property="og:title" content="Log In — Formulary Dashboard | Formulary" />
  <meta property="og:description" content="Log in to your Formulary dashboard to manage pharmacy inventory, process sales, and view reports." />
  <meta property="og:url" content="https://www.formulary.app/pages/dashboard.html" />
  <meta property="og:image" content="https://www.formulary.app/images/favicon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/output.css" />
  <link rel="icon" href="/images/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/images/favicon.png" />
  <meta property="og:image" content="https://www.formulary.app/images/favicon.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.formulary.app/images/favicon.png" />
</head>

<body class="font-body text-ink antialiased">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[100] focus:rounded-lg focus:bg-ink focus:px-4 focus:py-2 focus:text-paper">Skip to content</a>
  <div id="site-header"></div>

  <main id="main">
    <section class="flex min-h-[calc(100vh-200px)] items-center justify-center py-20">
      <div class="mx-auto w-full max-w-md px-6">
        <div class="rounded-[var(--radius-card)] border border-line bg-surface p-8 shadow-sm" data-reveal>
          <!-- Logo -->
          <div class="text-center">
            <a href="/index.html" class="inline-flex items-center gap-2.5">
              <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="1" y="1" width="32" height="32" rx="9" fill="#0E2321"/>
                <path d="M17 8v18M8 17h18" stroke="#F5F7F4" stroke-width="3.4" stroke-linecap="round"/>
                <circle cx="25.5" cy="8.5" r="3.4" fill="#E8A33D"/>
              </svg>
              <span class="font-display text-lg font-bold tracking-tight text-ink">Formulary</span>
            </a>
          </div>

          <h1 class="mt-6 text-center font-display text-2xl font-bold text-ink">Welcome back</h1>
          <p class="mt-2 text-center text-sm text-ink-soft">Log in to your pharmacy dashboard.</p>

          <form id="login-form" class="mt-8 space-y-5" onsubmit="event.preventDefault(); document.getElementById('login-error').classList.remove('hidden');">
            <div>
              <label for="login-email" class="block text-sm font-medium text-ink">Email</label>
              <input id="login-email" type="email" required placeholder="you@pharmacy.com" autocomplete="email" class="mt-1.5 w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink placeholder:text-ink-soft/50 focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand" />
            </div>
            <div>
              <div class="flex items-center justify-between">
                <label for="login-password" class="block text-sm font-medium text-ink">Password</label>
                <a href="#" class="text-xs text-brand-deep hover:underline">Forgot password?</a>
              </div>
              <input id="login-password" type="password" required placeholder="••••••••" autocomplete="current-password" class="mt-1.5 w-full rounded-lg border border-line bg-paper px-4 py-3 text-sm text-ink placeholder:text-ink-soft/50 focus:border-brand focus:outline-none focus:ring-1 focus:ring-brand" />
            </div>

            <div id="login-error" class="hidden rounded-lg bg-rust/10 px-4 py-3 text-sm text-rust">
              This is a demo login page. In production, this would connect to your Formulary account.
            </div>

            <button type="submit" class="btn-focus w-full rounded-lg bg-brand px-6 py-3.5 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-deep">
              Log in
            </button>
          </form>

          <div class="mt-6 text-center text-sm text-ink-soft">
            Don't have an account? <a href="/pages/demo.html" class="font-semibold text-brand-deep hover:underline">Start free trial</a>
          </div>
        </div>

        <p class="mt-6 text-center text-xs text-ink-soft/60">
          <a href="/pages/privacy.html" class="hover:text-brand-deep">Privacy</a> · <a href="/pages/tmc.html" class="hover:text-brand-deep">Terms</a>
        </p>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="../js/app.js" defer></script>
</body>
</html>
